# Technoqueue configuration.
#
# Each entry under `servers` defines a queue-managed backend:
#   queue-settings    Queue sizing and fallback routing for this backend:
#     target-capacity Max concurrent players on the backend before queueing kicks in.
#     max-queue-size  Max queued players; further connections are rejected.
#     fallbacks       Ordered list of servers where queued players wait. Tried in
#                     declaration order; the first one with available capacity
#                     (or the first reachable unmanaged server) is used.
#   bypass-permission Optional. Players with this permission skip the queue and
#                     connect to the target server directly. Omit or leave blank
#                     to disable.
#   show-action-bar   Whether players queued for this server receive a periodic
#                     action-bar update with their position. Defaults to true.
#                     The cadence is set globally by `action-bar-interval-seconds`.
#
# Example:
#   servers:
#     main:
#       queue-settings:
#         target-capacity: 200
#         max-queue-size: 500
#         fallbacks:
#           - lobby
#           - lobby-overflow
#       bypass-permission: technoqueue.bypass.main
#       show-action-bar: true

servers: {}

# Permission-based queue weights. Each entry pairs a permission node with a
# weight; players holding the permission receive that weight when they enter a
# queue (higher weight = higher priority). If a player holds multiple matching
# permissions, behavior is determined by the queue implementation.
#
# Example:
#   permissions:
#     - permission: technoqueue.priority.vip
#       weight: 10
#     - permission: technoqueue.priority.vip-plus
#       weight: 25
permissions: []

# How often (in seconds) each queue tries to promote waiting players onto its
# target server.
drain-interval-seconds: 10

# How often (in seconds) queued players receive an action-bar update with their
# current position. Action bars fade after ~3 seconds client-side, so values
# above 2 will produce visible flicker. Set to 0 to disable updates entirely;
# otherwise enable/disable per server with `show-action-bar` under each entry.
action-bar-interval-seconds: 2
