# Technoqueue messages. MiniMessage syntax: https://docs.advntr.dev/minimessage/format.html
#
# Keys can be nested; the loader flattens them with dots (e.g. queue.joined).
# Lists are joined with newlines. Available placeholders are noted per entry.

prefix: "<gray>[<aqua>Queue</aqua>]</gray>"

queue:
  # <server> -- the target server name
  joined: "<yellow>Server '<server>' is full — you've been placed in the queue.</yellow>"
  # <server> -- the target server name
  full-disconnect: "<red>The queue for '<server>' is full. Please try again later.</red>"
  # <server> -- the target server name
  full-denied: "<red>The queue for '<server>' is full.</red>"
  # <server>, <position>, <size> -- shown in the action bar at a fixed cadence
  action-bar: "<gray>Queued for <yellow><server></yellow>: <gold><position></gold>/<gold><size></gold></gray>"
  # <server> -- the queue the player left
  leave-success: "<green>You have left the queue for '<server>'.</green>"
  leave-not-queued: "<red>You are not currently in a queue.</red>"
  leave-not-player: "<red>Only players can leave a queue.</red>"
