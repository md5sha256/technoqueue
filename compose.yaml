services:
  proxy:
    build:
      context: .
      dockerfile: docker/proxy/Dockerfile
    image: technoqueue-proxy:dev
    container_name: technoqueue-proxy
    restart: unless-stopped
    stdin_open: true
    tty: true
    environment:
      TYPE: VELOCITY
      VELOCITY_VERSION: 3.5.0-SNAPSHOT
      MEMORY: 512m
    volumes:
      - ./docker/velocity/velocity.toml:/server/velocity.toml
      - ./docker/velocity/forwarding.secret:/server/forwarding.secret
      - ./docker/velocity/plugins/technoqueue/settings.yml:/server/plugins/technoqueue/settings.yml
      - proxy-data:/data
    ports:
      - "25565:25577"
    depends_on:
      - limbo-target-1
      - limbo-target-2
      - limbo-queue-1
      - limbo-queue-2
    networks:
      - technoqueue

  limbo-target-1:
    image: ghcr.io/quozul/picolimbo:latest
    container_name: technoqueue-limbo-target-1
    restart: unless-stopped
    environment:
      FORWARDING_SECRET: ${FORWARDING_SECRET:?FORWARDING_SECRET must be set in .env}
    volumes:
      - ./docker/limbo-target-1.toml:/usr/src/app/server.toml:ro
    ports:
      - "25566:25565"
    networks:
      - technoqueue

  limbo-target-2:
    image: ghcr.io/quozul/picolimbo:latest
    container_name: technoqueue-limbo-target-2
    restart: unless-stopped
    environment:
      FORWARDING_SECRET: ${FORWARDING_SECRET:?FORWARDING_SECRET must be set in .env}
    volumes:
      - ./docker/limbo-target-2.toml:/usr/src/app/server.toml:ro
    ports:
      - "25567:25565"
    networks:
      - technoqueue

  limbo-queue-1:
    image: ghcr.io/quozul/picolimbo:latest
    container_name: technoqueue-limbo-queue-1
    restart: unless-stopped
    environment:
      FORWARDING_SECRET: ${FORWARDING_SECRET:?FORWARDING_SECRET must be set in .env}
    volumes:
      - ./docker/limbo-queue-1.toml:/usr/src/app/server.toml:ro
    ports:
      - "25568:25565"
    networks:
      - technoqueue

  limbo-queue-2:
    image: ghcr.io/quozul/picolimbo:latest
    container_name: technoqueue-limbo-queue-2
    restart: unless-stopped
    environment:
      FORWARDING_SECRET: ${FORWARDING_SECRET:?FORWARDING_SECRET must be set in .env}
    volumes:
      - ./docker/limbo-queue-2.toml:/usr/src/app/server.toml:ro
    ports:
      - "25569:25565"
    networks:
      - technoqueue

volumes:
  proxy-data:

networks:
  technoqueue:
    driver: bridge
